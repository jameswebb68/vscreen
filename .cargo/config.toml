[build]
rustflags = []

[profile.dev]
opt-level = 0
debug = true

[profile.dev.package."*"]
opt-level = 2

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"

[profile.test]
opt-level = 1

[profile.bench]
opt-level = 3
debug = true

[alias]
t = "test --workspace"
c = "clippy --all-targets --all-features"
