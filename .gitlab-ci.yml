stages:
  - check
  - test
  - bench
  - release

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  RUSTFLAGS: "-D warnings"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry/
    - .cargo/git/
    - target/

# ---------------------------------------------------------------------------
# Check stage
# ---------------------------------------------------------------------------

format:
  stage: check
  script:
    - cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

clippy:
  stage: check
  script:
    - cargo clippy --all-targets --all-features -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deny:
  stage: check
  script:
    - cargo install cargo-deny --locked || true
    - cargo deny check licenses advisories
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# ---------------------------------------------------------------------------
# Test stage
# ---------------------------------------------------------------------------

test:unit:
  stage: test
  script:
    - cargo test --workspace --lib -- --nocapture
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:doc:
  stage: test
  script:
    - cargo test --workspace --doc
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:integration:
  stage: test
  script:
    - cargo test --workspace --test '*' -- --nocapture
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

coverage:
  stage: test
  script:
    - cargo install cargo-llvm-cov --locked || true
    - cargo llvm-cov --workspace --lcov --output-path coverage/lcov.info
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/lcov.info
    paths:
      - coverage/
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Bench stage
# ---------------------------------------------------------------------------

benchmarks:
  stage: bench
  script:
    - cargo bench --workspace -- --output-format bencher | tee bench-results.txt
  artifacts:
    paths:
      - bench-results.txt
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Release stage
# ---------------------------------------------------------------------------

build:release:
  stage: release
  script:
    - cargo build --workspace --release
  artifacts:
    paths:
      - target/release/vscreen
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
